<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taste Evaluator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d0d0d;
      --surface:      #141414;
      --card:         #1c1c1c;
      --border:       #2a2a2a;
      --hover:        #252525;
      --accent-anime: #3b82f6;
      --accent-manga: #a855f7;
      --accent-ln:    #f59e0b;
      --text:         #f0f0f0;
      --muted:        #888;
      --ease:         150ms ease;
      --cover-ph:     #222;
      --shadow-sm:    0 4px 20px rgba(0,0,0,.5);
      --shadow-lg:    0 12px 40px rgba(0,0,0,.72);
    }

    [data-theme="light"] {
      --bg:        #f3f4f6;
      --surface:   #ffffff;
      --card:      #f9fafb;
      --border:    #e5e7eb;
      --hover:     #eff0f2;
      --text:      #111827;
      --muted:     #6b7280;
      --cover-ph:  #d1d5db;
      --shadow-sm: 0 4px 20px rgba(0,0,0,.10);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.14);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Layout ─────────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      max-width: 1080px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* ── Left Panel ──────────────────────────────────────────── */
    .left-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-width: 0;
    }

    .branding h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .branding p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Segmented Control ───────────────────────────────────── */
    .seg-ctrl {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
      gap: 3px;
    }

    .seg-btn {
      flex: 1;
      padding: 7px 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      background: none;
      border: none;
      border-radius: 5px;
      color: var(--muted);
      cursor: pointer;
      transition: background var(--ease), color var(--ease);
    }

    .seg-btn:hover:not(.active) { background: var(--hover); color: var(--text); }

    .seg-btn.active[data-type="anime"]      { background: var(--accent-anime); color: #fff; }
    .seg-btn.active[data-type="manga"]      { background: var(--accent-manga); color: #fff; }
    .seg-btn.active[data-type="lightnovel"] { background: var(--accent-ln);   color: #000; }
    .seg-btn.active[data-type="character"]  { background: #ec4899;             color: #fff; }

    /* ── Search ──────────────────────────────────────────────── */
    .search-wrap { position: relative; }

    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color var(--ease);
    }

    .search-input::placeholder { color: var(--muted); }

    .search-input[data-type="anime"]:focus      { border-color: var(--accent-anime); }
    .search-input[data-type="manga"]:focus      { border-color: var(--accent-manga); }
    .search-input[data-type="lightnovel"]:focus { border-color: var(--accent-ln); }
    .search-input[data-type="character"]:focus  { border-color: #ec4899; }

    .search-err {
      font-size: 12px;
      color: #ef4444;
      margin-top: 6px;
      display: none;
    }

    .search-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 5px;
      display: none;
    }

    .search-hint.visible { display: block; }

    /* ── Dropdown ────────────────────────────────────────────── */
    .dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow-lg);
      z-index: 100;
      overflow: hidden;
      display: none;
    }

    .dropdown.open { display: block; }

    .drop-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      cursor: pointer;
      transition: background var(--ease);
      user-select: none;
    }

    .drop-item:not(.added):hover { background: var(--hover); }
    .drop-item.added { opacity: .38; cursor: default; }

    .drop-status {
      padding: 14px 12px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    /* ── Covers ──────────────────────────────────────────────── */
    .cover {
      width: 40px; height: 56px;
      border-radius: 4px;
      flex-shrink: 0;
      object-fit: cover;
      background: var(--cover-ph);
      display: block;
    }

    .cover-ph {
      width: 40px; height: 56px;
      border-radius: 4px;
      flex-shrink: 0;
      background: var(--cover-ph);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Item Info ───────────────────────────────────────────── */
    .item-info { flex: 1; min-width: 0; }

    .item-title {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .list-item .item-title {
      white-space: normal;
      overflow: visible;
      text-overflow: unset;
      word-break: break-word;
    }

    .item-year { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── Badges ──────────────────────────────────────────────── */
    .badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .4px;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .badge-anime      { background: rgba(59,130,246,.18); color: var(--accent-anime); }
    .badge-manga      { background: rgba(168,85,247,.18); color: var(--accent-manga); }
    .badge-lightnovel { background: rgba(245,158,11,.18); color: var(--accent-ln); }
    .badge-character  { background: rgba(236,72,153,.18); color: #ec4899; }

    .check { color: #4ade80; font-size: 15px; flex-shrink: 0; }

    .attribution { font-size: 11px; color: var(--muted); }

    /* ── Right Panel ─────────────────────────────────────────── */
    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 0;
    }

    .list-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .list-header { font-size: 15px; font-weight: 600; }

    .btn-group-toggle {
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .3px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      padding: 3px 8px;
      white-space: nowrap;
      transition: background var(--ease), color var(--ease), border-color var(--ease);
    }

    .btn-group-toggle:hover { background: var(--hover); color: var(--text); }

    .btn-group-toggle.active {
      background: var(--surface);
      color: var(--text);
      border-color: var(--muted);
    }

    .type-group-header {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 6px 2px 2px;
    }

    .type-group-header:first-child { padding-top: 0; }

    .list-body {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .list-empty {
      font-size: 13px;
      color: var(--muted);
      padding: 20px 0;
      text-align: center;
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px 8px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: background var(--ease);
    }

    .list-item:hover { background: var(--hover); }

    .list-item[data-type="anime"]      { border-left: 3px solid var(--accent-anime); }
    .list-item[data-type="manga"]      { border-left: 3px solid var(--accent-manga); }
    .list-item[data-type="lightnovel"] { border-left: 3px solid var(--accent-ln); }
    .list-item[data-type="character"]  { border-left: 3px solid #ec4899; }

    .remove-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      flex-shrink: 0;
      transition: color var(--ease), background var(--ease);
    }

    .remove-btn:hover {
      color: #ef4444;
      background: rgba(239, 68, 68, .12);
    }

    /* ── Prompt Mode ─────────────────────────────────────────── */
    .prompt-mode {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .prompt-mode-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .mode-btns {
      display: flex;
      gap: 6px;
    }

    .mode-btn {
      flex: 1;
      padding: 7px 6px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      transition: background var(--ease), color var(--ease), border-color var(--ease);
      text-align: center;
      line-height: 1.3;
    }

    .mode-btn:hover:not(.active) {
      background: var(--hover);
      color: var(--text);
    }

    .mode-btn.active {
      color: #fff;
      border-color: transparent;
    }

    .mode-btn.active[data-mode="analytical"] { background: #3b82f6; }
    .mode-btn.active[data-mode="roast"]      { background: #ef4444; }
    .mode-btn.active[data-mode="therapist"]  { background: #22c55e; color: #000; }

    /* ── Actions ─────────────────────────────────────────────── */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .btn-copy {
      width: 100%;
      padding: 12px;
      background: var(--accent-anime);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity var(--ease), transform var(--ease);
    }

    .btn-copy:hover  { opacity: .88; transform: translateY(-1px); }
    .btn-copy:active { transform: none; opacity: .78; }

    .action-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 4px 0;
    }

    .btn-clear {
      width: 100%;
      padding: 8px;
      background: none;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: color var(--ease), border-color var(--ease), background var(--ease);
    }

    .btn-clear:hover {
      color: #ef4444;
      border-color: rgba(239, 68, 68, .35);
      background: rgba(239, 68, 68, .06);
    }

    /* ── Toast ───────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-sm);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Grid Builder ───────────────────────────────────────── */
    .grid-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .grid-section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .grid-size-btns {
      display: flex;
      gap: 6px;
    }

    .btn-grid {
      flex: 1;
      padding: 7px 6px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      transition: background var(--ease), color var(--ease), border-color var(--ease);
    }

    .btn-grid:hover { background: var(--hover); color: var(--text); }

    /* ── Grid Modal ──────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .82);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-box {
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      max-width: min(90vw, 560px);
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      padding: 4px 9px;
      transition: color var(--ease), background var(--ease);
    }

    .modal-close:hover { color: var(--text); background: var(--hover); }

    .modal-grid-img {
      width: 100%;
      border-radius: 6px;
      display: block;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    .btn-modal {
      flex: 1;
      padding: 10px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity var(--ease), transform var(--ease);
    }

    .btn-modal:hover  { opacity: .85; transform: translateY(-1px); }
    .btn-modal:active { transform: none; }

    .btn-modal-save { background: var(--accent-anime); color: #fff; border: none; }
    .btn-modal-copy { background: none; color: var(--text); border: 1px solid var(--border); }

    /* ── Prompt Modal ────────────────────────────────────────── */
    .prompt-modal-box {
      max-width: min(90vw, 680px);
      align-items: stretch;
    }

    .prompt-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
    }

    .prompt-modal-title {
      font-size: 15px;
      font-weight: 600;
    }

    .prompt-modal-btns {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .prompt-copy-btn {
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 10px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      transition: background var(--ease), border-color var(--ease);
    }

    .prompt-copy-btn:hover { background: var(--hover); border-color: var(--muted); }

    .prompt-close-btn {
      font-family: inherit;
      font-size: 16px;
      line-height: 1;
      padding: 4px 9px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      transition: color var(--ease), background var(--ease);
    }

    .prompt-close-btn:hover { color: var(--text); background: var(--hover); }

    .prompt-textarea {
      width: 100%;
      min-height: 420px;
      resize: vertical;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      line-height: 1.6;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      outline: none;
      transition: border-color var(--ease);
    }

    .prompt-textarea:focus { border-color: var(--muted); }

    /* ── Theme Toggle ────────────────────────────────────────── */
    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
      z-index: 200;
      transition: background var(--ease), border-color var(--ease), transform var(--ease);
    }

    .theme-toggle:hover { background: var(--hover); transform: scale(1.08); }

    /* ── Drag & Drop ────────────────────────────────────────── */
    .drag-handle {
      color: var(--muted);
      cursor: grab;
      font-size: 14px;
      flex-shrink: 0;
      padding: 0 2px;
      opacity: 0.4;
      user-select: none;
      line-height: 1;
    }

    .list-item:hover .drag-handle { opacity: 0.8; }
    .drag-handle:active { cursor: grabbing; }
    .list-item.dragging { opacity: 0.35; }

    .list-item.drag-over-top    { box-shadow: 0 -2px 0 var(--accent-anime); }
    .list-item.drag-over-bottom { box-shadow: 0  2px 0 var(--accent-anime); }

    /* ── Mobile ──────────────────────────────────────────────── */
    @media (max-width: 700px) {
      .app {
        grid-template-columns: 1fr;
        padding: 24px 16px;
        gap: 32px;
      }

      .list-body {
        max-height: 60vh;
        overflow-y: auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- ── Left Panel ── -->
    <section class="left-panel">
      <div class="branding">
        <h1>Taste Evaluator</h1>
        <p>Build your list. Discover your taste.</p>
      </div>

      <div class="seg-ctrl" role="group" aria-label="Media type">
        <button class="seg-btn active" data-type="anime">Anime</button>
        <button class="seg-btn" data-type="manga">Manga</button>
        <button class="seg-btn" data-type="lightnovel">Light Novel</button>
        <button class="seg-btn" data-type="character">Characters</button>
      </div>

      <div class="search-wrap">
        <input
          id="searchInput"
          class="search-input"
          type="text"
          placeholder="Search titles..."
          autocomplete="off"
          spellcheck="false"
          data-type="anime"
        />
        <div id="dropdown" class="dropdown" role="listbox"></div>
        <div id="searchErr" class="search-err"></div>
        <div id="searchHint" class="search-hint">Tip: use the character's full name for accuracy (e.g. "Akemi Homura")</div>
      </div>

      <div class="actions">
        <div class="prompt-mode">
          <span class="prompt-mode-label">Prompt Style</span>
          <div class="mode-btns" role="group">
            <button class="mode-btn active" data-mode="analytical">🧠 Analytical</button>
            <button class="mode-btn" data-mode="roast">🔥 Roast</button>
            <button class="mode-btn" data-mode="therapist">🛋 Therapist</button>
          </div>
        </div>
        <button id="btnCopy" class="btn-copy">📋 Copy LLM Prompt</button>
        <button id="btnClear" class="btn-clear">🗑 Clear List</button>
        <hr class="action-divider" />
        <div class="grid-section">
          <span class="grid-section-label">Cover Grid</span>
          <div class="grid-size-btns">
            <button class="btn-grid" data-n="3">3 × 3</button>
            <button class="btn-grid" data-n="4">4 × 4</button>
            <button class="btn-grid" data-n="5">5 × 5</button>
          </div>
        </div>
      </div>

      <p class="attribution">Powered by MyAnimeList / Jikan</p>
    </section>

    <!-- ── Right Panel ── -->
    <section class="right-panel">
      <div class="list-controls">
        <h2 id="listHeader" class="list-header">Your List (0 items)</h2>
        <button id="btnGroupToggle" class="btn-group-toggle">Group by type</button>
      </div>
      <div id="listBody" class="list-body">
        <p class="list-empty">Search for titles to add them to your list.</p>
      </div>
    </section>

  </div>

  <div id="toast" class="toast"></div>
  <button id="themeToggle" class="theme-toggle" title="Toggle light / dark mode">🌙</button>

  <script>
    'use strict';

    const STORAGE_KEY = 'tasteEvaluator_v2';
    const BASE        = 'https://api.jikan.moe/v4';
    const DEBOUNCE_MS = 400;

    let mediaType  = 'anime';
    let userList   = [];
    let dropCache  = [];
    let debTimer   = null;
    let fetchCtrl  = null;
    let dragSrcIdx = null;
    let dragTgtIdx = null;
    let dragPos    = null; // 'top' | 'bottom'
    let groupByType = false;

    // ── Storage ────────────────────────────────────────────────
    function loadList() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) { userList = JSON.parse(raw); return; }
        const old = localStorage.getItem('tasteEvaluator_v1');
        if (old) { userList = JSON.parse(old); saveList(); }
      } catch { userList = []; }
    }

    function saveList() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(userList));
    }

    function inList(malId, type) {
      return userList.some(i => i.malId === malId && i.type === type);
    }

    // ── DOM Helpers ────────────────────────────────────────────
    function badgeClass(type) {
      return type === 'anime'      ? 'badge-anime'
           : type === 'manga'      ? 'badge-manga'
           : type === 'character'  ? 'badge-character'
                                   : 'badge-lightnovel';
    }

    function badgeLabel(type) {
      return type === 'anime' ? 'Anime' : type === 'manga' ? 'Manga' : type === 'character' ? 'Char' : 'LN';
    }

    function makeBadge(type) {
      const b = document.createElement('span');
      b.className = `badge ${badgeClass(type)}`;
      b.textContent = badgeLabel(type);
      return b;
    }

    function makePlaceholder(type) {
      const div = document.createElement('div');
      div.className = 'cover-ph';
      div.appendChild(makeBadge(type));
      return div;
    }

    function makeCover(url, type) {
      if (!url) return makePlaceholder(type);
      const img = document.createElement('img');
      img.className = 'cover';
      img.src = url;
      img.alt = '';
      img.onerror = () => img.parentNode?.replaceChild(makePlaceholder(type), img);
      return img;
    }

    function toJapaneseOrder(name) {
      const parts = name.trim().split(/\s+/);
      return parts.length < 2 ? name : parts.reverse().join(' ');
    }

    function makeItemInfo(title, subtitle) {
      const div = document.createElement('div');
      div.className = 'item-info';
      const t = document.createElement('div');
      t.className = 'item-title';
      t.textContent = title;
      const y = document.createElement('div');
      y.className = 'item-year';
      y.textContent = subtitle || '';
      div.appendChild(t);
      div.appendChild(y);
      return div;
    }

    // ── Drag Helpers ───────────────────────────────────────────
    function clearDragIndicators() {
      document.querySelectorAll('#listBody .list-item').forEach(el => {
        el.classList.remove('drag-over-top', 'drag-over-bottom');
      });
    }

    // ── Render List ────────────────────────────────────────────
    function renderList() {
      const body   = document.getElementById('listBody');
      const header = document.getElementById('listHeader');
      const n = userList.length;
      header.textContent = `Your List (${n} item${n !== 1 ? 's' : ''})`;
      body.innerHTML = '';

      if (n === 0) {
        const p = document.createElement('p');
        p.className = 'list-empty';
        p.textContent = 'Search for titles to add them to your list.';
        body.appendChild(p);
        return;
      }

      function makeBaseRow(item) {
        const row = document.createElement('div');
        row.className = 'list-item';
        row.dataset.type = item.type;
        row.appendChild(makeCover(item.coverUrl, item.type));
        row.appendChild(makeItemInfo(item.title, item.type === 'character' ? item.source : item.year));
        row.appendChild(makeBadge(item.type));
        const rm = document.createElement('button');
        rm.className = 'remove-btn';
        rm.title = 'Remove';
        rm.textContent = '×';
        rm.addEventListener('click', () => {
          userList = userList.filter(i => !(i.malId === item.malId && i.type === item.type));
          saveList();
          renderList();
          renderDrop(dropCache);
        });
        row.appendChild(rm);
        return row;
      }

      if (groupByType) {
        const GROUPS = [
          { type: 'anime',       label: 'Anime' },
          { type: 'manga',       label: 'Manga' },
          { type: 'lightnovel',  label: 'Light Novels' },
          { type: 'character',   label: 'Characters' },
        ];
        GROUPS.forEach(({ type, label }) => {
          const items = userList.filter(i => i.type === type);
          if (!items.length) return;
          const hdr = document.createElement('p');
          hdr.className = 'type-group-header';
          hdr.textContent = label;
          body.appendChild(hdr);
          items.forEach(item => body.appendChild(makeBaseRow(item)));
        });
      } else {
        userList.forEach((item, idx) => {
          const row = makeBaseRow(item);
          row.draggable = true;

          const handle = document.createElement('span');
          handle.className = 'drag-handle';
          handle.textContent = '⠿';
          handle.setAttribute('aria-hidden', 'true');
          row.insertBefore(handle, row.firstChild);

          // ── Drag events ──
          row.addEventListener('dragstart', e => {
            dragSrcIdx = idx;
            e.dataTransfer.effectAllowed = 'move';
            requestAnimationFrame(() => row.classList.add('dragging'));
          });

          row.addEventListener('dragend', () => {
            row.classList.remove('dragging');
            clearDragIndicators();
            dragSrcIdx = dragTgtIdx = dragPos = null;
          });

          row.addEventListener('dragover', e => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const rect = row.getBoundingClientRect();
            const pos  = e.clientY < rect.top + rect.height / 2 ? 'top' : 'bottom';
            clearDragIndicators();
            row.classList.add(pos === 'top' ? 'drag-over-top' : 'drag-over-bottom');
            dragTgtIdx = idx;
            dragPos    = pos;
          });

          row.addEventListener('drop', e => {
            e.preventDefault();
            if (dragSrcIdx === null || dragSrcIdx === dragTgtIdx) return;
            const [moved] = userList.splice(dragSrcIdx, 1);
            let insertAt  = dragTgtIdx > dragSrcIdx ? dragTgtIdx - 1 : dragTgtIdx;
            if (dragPos === 'bottom') insertAt += 1;
            userList.splice(insertAt, 0, moved);
            saveList();
            renderList();
          });

          body.appendChild(row);
        });
      }
    }

    // ── Render Dropdown ────────────────────────────────────────
    function renderDrop(results) {
      dropCache = results;
      const dd = document.getElementById('dropdown');
      dd.innerHTML = '';

      if (!results.length) { dd.classList.remove('open'); return; }

      results.forEach(r => {
        const type = mediaType;

        let title, subtitle, coverUrl, largeUrl, malId, added, onAdd;

        if (type === 'character') {
          // title    = r.name;
          title    = toJapaneseOrder(r.name);
          subtitle = '';
          coverUrl = r.images?.jpg?.image_url ?? r.images?.jpg?.small_image_url ?? null;
          largeUrl = coverUrl;
          malId    = r.mal_id;
          added    = inList(malId, 'character');
          onAdd    = null; // character adds are handled async in the click listener
        } else {
          title    = (r.title_english && r.title_english.trim()) ? r.title_english : r.title;
          subtitle = type === 'anime' ? r.aired?.prop?.from?.year : r.published?.prop?.from?.year;
          coverUrl = r.images?.jpg?.small_image_url ?? null;
          largeUrl = r.images?.jpg?.large_image_url ?? r.images?.jpg?.image_url ?? null;
          malId    = r.mal_id;
          added    = inList(malId, type);
          onAdd    = () => userList.push({ malId, title, year: subtitle ?? null, type, coverUrl, largeUrl });
        }

        const row = document.createElement('div');
        row.className = 'drop-item' + (added ? ' added' : '');
        row.setAttribute('role', 'option');

        row.appendChild(makeCover(coverUrl, type));
        row.appendChild(makeItemInfo(title, subtitle));
        row.appendChild(makeBadge(type));

        if (added) {
          const ck = document.createElement('span');
          ck.className = 'check';
          ck.textContent = '✓';
          row.appendChild(ck);
        } else {
          row.addEventListener('click', async () => {
            if (type === 'character') {
              row.style.opacity = '0.5';
              row.style.pointerEvents = 'none';
              let source = 'Unknown';
              try {
                const fullRes  = await fetch(`${BASE}/characters/${malId}/full`, { headers: { Accept: 'application/json' } });
                const fullJson = await fullRes.json();
                const data     = fullJson.data;
                source = data?.anime?.[0]?.anime?.title ?? data?.manga?.[0]?.manga?.title ?? 'Unknown';
              } catch {}
              userList.push({ malId, title, source, type: 'character', coverUrl, largeUrl });
            } else {
              onAdd();
            }
            saveList();
            renderList();
            renderDrop(dropCache);
          });
        }

        dd.appendChild(row);
      });

      dd.classList.add('open');
    }

    function hideDrop() {
      document.getElementById('dropdown').classList.remove('open');
      dropCache = [];
    }

    // ── API ────────────────────────────────────────────────────
    async function doSearch(q) {
      if (!q.trim()) { hideDrop(); return; }

      if (fetchCtrl) fetchCtrl.abort();
      fetchCtrl = new AbortController();

      showErr(null);

      const dd = document.getElementById('dropdown');
      dd.innerHTML = '<div class="drop-status">Searching…</div>';
      dd.classList.add('open');

      try {
        let url;
        if (mediaType === 'anime') {
          url = `${BASE}/anime?q=${encodeURIComponent(q)}&limit=8&sfw=true`;
        } else if (mediaType === 'manga') {
          url = `${BASE}/manga?q=${encodeURIComponent(q)}&type=manga&limit=8&sfw=true`;
        } else if (mediaType === 'character') {
          url = `${BASE}/characters?q=${encodeURIComponent(q)}&limit=8`;
        } else {
          url = `${BASE}/manga?q=${encodeURIComponent(q)}&type=lightnovel&limit=8&sfw=true`;
        }

        const res = await fetch(url, {
          signal: fetchCtrl.signal,
          headers: { Accept: 'application/json' },
        });

        if (!res.ok) throw new Error('api-err');
        const json = await res.json();
        renderDrop(json.data ?? []);
      } catch (e) {
        if (e.name === 'AbortError') return;
        hideDrop();
        showErr('Search unavailable — try again');
      }
    }

    function showErr(msg) {
      const el = document.getElementById('searchErr');
      el.textContent = msg || '';
      el.style.display = msg ? 'block' : 'none';
    }

    let promptMode = 'analytical';

    const PROMPTS = {
      analytical: (anime, manga, ln, characters, fmt, fmtChar) => [
        "The following is the user's media consumption list across anime, manga, and light novels.",
        "Analyze their taste profile along these specific axes, in order:",
        "1. THEMATIC CORE — What 2-3 recurring themes or emotional preoccupations tie the list together? Be specific to the titles, not generic.",
        "2. GENRE LITERACY — What does the selection reveal about how deeply they know the medium? Are they skimming the surface, working through a specific niche, or showing genuine range?",
        "3. BLIND SPOTS — What didn't make the favorites list? Focus especially on works *within their own apparent taste territory* that are conspicuously absent — not genres they obviously reject. Do NOT frame this as \"they haven't seen X\" — frame it as \"X didn't resonate enough to include, which suggests...\" What does that specific exclusion reveal?",
        "4. PERSONA READ — Based purely on these selections, describe the kind of person making this list. Not their demographics — their actual personality, likely self-image, and how they probably talk about media at parties.",
        "5. ONE-LINE VERDICT — A single brutal, specific sentence summarizing their taste.",
        "6. CHARACTER PROFILE — What does the pattern of their favorite characters reveal about their idealized self-image or the type of person they find most compelling? Look for archetypes, recurring dynamics, or contradictions with the media list.",
        "",
        "If you are not confident you know a character well enough to analyze them accurately, say so explicitly rather than inferring. Uncertain characters should be flagged, not fabricated.",
        "",
        "Be direct. Do not hedge. Do not summarize plot. Assume the reader knows these works.",
        '',
        '**Anime watched:**',
        fmt(anime),
        '',
        '**Manga read:**',
        fmt(manga),
        '',
        '**Light Novels read:**',
        fmt(ln),
        '',
        '**Favorite characters:**',
        fmtChar(characters),
      ].join('\n'),

      roast: (anime, manga, ln, characters, fmt, fmtChar) => [
        "The following is someone's list of their favorite anime, manga, and light novels.",
        "Your job is to roast their taste — hard. You are a brutally witty critic who finds the most embarrassing possible interpretation of every choice they've made.",
        "",
        "Structure your roast as follows:",
        "1. OPENING DIAGNOSIS — One punchy paragraph establishing the overall pathology of this taste profile. Be specific to the actual titles, not generic.",
        "2. INDIVIDUAL CRIMES — Pick 2-3 of the most roastable specific choices and explain exactly why each one is a red flag. Be precise and cruel. If they've added favorite characters, these are mandatory roast targets — a character choice is the most revealing thing on the list.",
        "3. WHAT THIS SAYS ABOUT THEM — What kind of person has this exact combination of titles in their favorites? Paint a picture. Be mean but accurate.",
        "4. THE BACKHANDED COMPLIMENT — Find one genuinely defensible thing about their taste and deliver it in the most condescending way possible.",
        "5. SENTENCE — One closing line, delivered like a verdict.",
        "",
        "If you are not confident you know a character well enough to analyze them accurately, say so explicitly rather than inferring. Uncertain characters should be flagged, not fabricated.",
        "",
        "Rules: No generic insults. Every joke must be specific to the actual titles listed. Assume they've read/watched far more than this — these are just their favorites, which makes it worse.",
        '',
        '**Anime watched:**',
        fmt(anime),
        '',
        '**Manga read:**',
        fmt(manga),
        '',
        '**Light Novels read:**',
        fmt(ln),
        '',
        '**Favorite characters:**',
        fmtChar(characters),
      ].join('\n'),

      therapist: (anime, manga, ln, characters, fmt, fmtChar) => [
        "The following is a patient's list of their favorite anime, manga, and light novels.",
        "You are a perceptive therapist conducting an intake session. Analyze what their media consumption reveals about their inner life — with warmth, but without flinching from uncomfortable truths.",
        "",
        "Structure your session notes as follows:",
        "1. PRESENTING PATTERNS — What emotional needs does this list appear to be meeting? What are they seeking in fiction that they may not be finding elsewhere?",
        "2. CORE WOUND — Based on the recurring themes, what does this taste profile suggest about their relationship with intimacy, failure, control, or identity? Be specific to the titles.",
        "3. COPING MECHANISM — How are they using fiction? As escapism, as emotional rehearsal, as self-soothing, as a mirror? What does that suggest?",
        "4. GROWTH EDGE — What kinds of stories are conspicuously absent from their favorites — not because they dislike them, but because they might be too uncomfortable or unfamiliar to seek out?",
        "5b. CHARACTER MIRROR — If favorite characters are listed, what does the pattern reveal about who they wish they were, who they fear they are, or what relational dynamic they keep seeking out?",
        "6. CLINICIAN'S NOTE — A single honest, compassionate sentence summarizing what you'd want them to reflect on.",
        "",
        "If you are not confident you know a character well enough to analyze them accurately, say so explicitly rather than inferring. Uncertain characters should be flagged, not fabricated.",
        "",
        "Tone: Warm but clear-eyed. You care about them. You're also not going to let them off the hook. Do not pathologize, but do not minimize. Treat their taste as a genuine window into their interior life.",
        '',
        '**Anime watched:**',
        fmt(anime),
        '',
        '**Manga read:**',
        fmt(manga),
        '',
        '**Light Novels read:**',
        fmt(ln),
        '',
        '**Favorite characters:**',
        fmtChar(characters),
      ].join('\n'),
    };

    // ── Prompt Builder ─────────────────────────────────────────
    function buildPrompt() {
      const anime      = userList.filter(i => i.type === 'anime');
      const manga      = userList.filter(i => i.type === 'manga');
      const ln         = userList.filter(i => i.type === 'lightnovel');
      const characters = userList.filter(i => i.type === 'character');
      const fmt = arr =>
        arr.length
          ? arr.map(i => `- ${i.title}${i.year ? ` (${i.year})` : ''}`).join('\n')
          : 'None.';
      const fmtChar = arr =>
        arr.length
          ? arr.map(i => `- ${i.title} (${i.source})`).join('\n')
          : 'None.';
      return PROMPTS[promptMode](anime, manga, ln, characters, fmt, fmtChar);
    }

    // ── Toast ──────────────────────────────────────────────────
    let toastTm = null;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTm);
      toastTm = setTimeout(() => el.classList.remove('show'), 2000);
    }

    // ── Cover Grid ─────────────────────────────────────────────
    const CELL_W = 225;
    const CELL_H = 315; // matches MAL's native image dimensions

    const PH_BG = { anime: '#0f2340', manga: '#2a1040', lightnovel: '#3a2200' };
    const PH_FG = { anime: '#3b82f6', manga: '#a855f7', lightnovel: '#f59e0b' };

    function getHighResUrl(item) {
      // Prefer explicitly stored large URL
      if (item.largeUrl) return item.largeUrl;
      // Derive large URL from MAL CDN thumbnail pattern: '...t.jpg' → '...l.jpg'
      if (item.coverUrl) {
        const derived = item.coverUrl.replace(/t\.(jpe?g|webp|png)$/i, 'l.$1');
        if (derived !== item.coverUrl) return derived;
      }
      return item.coverUrl;
    }

    function loadCORSImage(url) {
      return new Promise(resolve => {
        if (!url) { resolve(null); return; }
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload  = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = url;
      });
    }

    function drawCell(ctx, x, y, img, item) {
      if (img) {
        ctx.drawImage(img, x, y, CELL_W, CELL_H);
      } else {
        ctx.fillStyle = PH_BG[item.type] || '#1c1c1c';
        ctx.fillRect(x, y, CELL_W, CELL_H);
        ctx.fillStyle = PH_FG[item.type] || '#888';
        ctx.font = `bold ${Math.round(CELL_W * 0.38)}px Inter, system-ui, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(item.title.charAt(0).toUpperCase(), x + CELL_W / 2, y + CELL_H / 2);
      }
    }

    function showPromptModal() {
      if (!userList.length) { showToast('Add some titles first'); return; }
      document.getElementById('promptModal')?.remove();

      const backdrop = document.createElement('div');
      backdrop.className = 'modal-backdrop';
      backdrop.id = 'promptModal';

      const box = document.createElement('div');
      box.className = 'modal-box prompt-modal-box';

      const hdr = document.createElement('div');
      hdr.className = 'prompt-modal-header';

      const title = document.createElement('span');
      title.className = 'prompt-modal-title';
      title.textContent = 'LLM Prompt';
      hdr.appendChild(title);

      const btnRow = document.createElement('div');
      btnRow.className = 'prompt-modal-btns';

      const copyBtn = document.createElement('button');
      copyBtn.className = 'prompt-copy-btn';
      copyBtn.textContent = '📋 Copy';

      const closeBtn = document.createElement('button');
      closeBtn.className = 'prompt-close-btn';
      closeBtn.textContent = '×';

      btnRow.appendChild(copyBtn);
      btnRow.appendChild(closeBtn);
      hdr.appendChild(btnRow);
      box.appendChild(hdr);

      const ta = document.createElement('textarea');
      ta.className = 'prompt-textarea';
      ta.value = buildPrompt();
      ta.spellcheck = false;
      box.appendChild(ta);

      closeBtn.addEventListener('click', () => backdrop.remove());

      copyBtn.addEventListener('click', async () => {
        const text = ta.value;
        try {
          await navigator.clipboard.writeText(text);
        } catch {
          ta.select();
          document.execCommand('copy');
        }
        copyBtn.textContent = '✓ Copied!';
        setTimeout(() => { copyBtn.textContent = '📋 Copy'; }, 1500);
      });

      backdrop.addEventListener('click', e => { if (e.target === backdrop) backdrop.remove(); });
      backdrop.appendChild(box);
      document.body.appendChild(backdrop);
      ta.focus();
    }

    async function buildGrid(n) {
      const needed   = n * n;
      const eligible = userList.filter(i => i.type !== 'character');
      if (eligible.length < needed) {
        const diff = needed - eligible.length;
        showToast(`Add ${diff} more title${diff !== 1 ? 's' : ''} for a ${n}×${n} grid`);
        return;
      }

      const items  = eligible.slice(0, needed);
      const canvas = document.createElement('canvas');
      canvas.width  = n * CELL_W;
      canvas.height = n * CELL_H;
      const ctx = canvas.getContext('2d');

      const images = await Promise.all(items.map(item => loadCORSImage(getHighResUrl(item))));
      items.forEach((item, i) => {
        drawCell(ctx, (i % n) * CELL_W, Math.floor(i / n) * CELL_H, images[i], item);
      });

      showGridModal(canvas);
    }

    function showGridModal(canvas) {
      document.getElementById('gridModal')?.remove();

      let dataUrl = null;
      try { dataUrl = canvas.toDataURL('image/png'); } catch {}

      const backdrop = document.createElement('div');
      backdrop.className = 'modal-backdrop';
      backdrop.id = 'gridModal';

      const box = document.createElement('div');
      box.className = 'modal-box';

      const closeBtn = document.createElement('button');
      closeBtn.className = 'modal-close';
      closeBtn.textContent = '×';
      closeBtn.addEventListener('click', () => backdrop.remove());
      box.appendChild(closeBtn);

      if (dataUrl) {
        const img = document.createElement('img');
        img.className = 'modal-grid-img';
        img.src = dataUrl;
        img.alt = 'Cover grid';
        box.appendChild(img);
      } else {
        canvas.className = 'modal-grid-img';
        box.appendChild(canvas);
      }

      const actionsDiv = document.createElement('div');
      actionsDiv.className = 'modal-actions';

      const saveBtn = document.createElement('button');
      saveBtn.className = 'btn-modal btn-modal-save';
      saveBtn.textContent = '💾 Save Image';
      saveBtn.addEventListener('click', () => {
        if (dataUrl) {
          const a = document.createElement('a');
          a.href = dataUrl;
          a.download = 'taste-grid.png';
          a.click();
        } else {
          showToast('Right-click the image to save');
        }
      });

      const copyBtn = document.createElement('button');
      copyBtn.className = 'btn-modal btn-modal-copy';
      copyBtn.textContent = '📋 Copy Image';
      copyBtn.addEventListener('click', () => {
        if (!dataUrl) { showToast('Right-click the image to copy'); return; }
        canvas.toBlob(async blob => {
          try {
            await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
            showToast('Image copied!');
          } catch {
            showToast('Copy failed — use Save instead');
          }
        });
      });

      actionsDiv.appendChild(saveBtn);
      actionsDiv.appendChild(copyBtn);
      box.appendChild(actionsDiv);
      backdrop.appendChild(box);
      backdrop.addEventListener('click', e => { if (e.target === backdrop) backdrop.remove(); });
      document.body.appendChild(backdrop);
    }

    // ── Events ─────────────────────────────────────────────────

    // Grid buttons
    document.querySelectorAll('.btn-grid').forEach(btn => {
      btn.addEventListener('click', () => buildGrid(parseInt(btn.dataset.n)));
    });

    // Mode buttons
    const COPY_LABELS = {
      analytical: '📋 Copy LLM Prompt',
      roast:      '🔥 Copy Roast Prompt',
      therapist:  '🛋 Copy Therapist Prompt',
    };

    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        promptMode = btn.dataset.mode;
        document.getElementById('btnCopy').textContent = COPY_LABELS[promptMode];
      });
    });

    // Segmented control
    document.querySelectorAll('.seg-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        mediaType = btn.dataset.type;
        const input = document.getElementById('searchInput');
        input.dataset.type = mediaType;
        input.value = '';
        showErr(null);
        hideDrop();
        document.getElementById('searchHint').classList.toggle('visible', mediaType === 'character');
      });
    });

    // Search
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', () => {
      clearTimeout(debTimer);
      const val = searchInput.value;
      if (!val.trim()) { hideDrop(); showErr(null); return; }
      debTimer = setTimeout(() => doSearch(val), DEBOUNCE_MS);
    });

    // Close dropdown on outside interaction
    document.addEventListener('pointerdown', e => {
      if (!e.target.closest('.search-wrap')) hideDrop();
    });

    // Copy LLM Prompt → open preview modal
    document.getElementById('btnCopy').addEventListener('click', () => showPromptModal());

    // Clear list
    document.getElementById('btnClear').addEventListener('click', () => {
      if (!userList.length) return;
      userList = [];
      saveList();
      renderList();
    });

    // Group by type toggle
    document.getElementById('btnGroupToggle').addEventListener('click', () => {
      groupByType = !groupByType;
      document.getElementById('btnGroupToggle').classList.toggle('active', groupByType);
      renderList();
    });

    // ── Theme ──────────────────────────────────────────────────
    const themeToggle = document.getElementById('themeToggle');

    function applyTheme(light) {
      document.documentElement.dataset.theme = light ? 'light' : '';
      themeToggle.textContent = light ? '☀️' : '🌙';
      themeToggle.title = light ? 'Switch to dark mode' : 'Switch to light mode';
    }

    const savedLight = localStorage.getItem('tasteEvaluator_lightMode') === 'true';
    applyTheme(savedLight);

    themeToggle.addEventListener('click', () => {
      const nowLight = document.documentElement.dataset.theme !== 'light';
      localStorage.setItem('tasteEvaluator_lightMode', nowLight);
      applyTheme(nowLight);
    });

    // ── Init ───────────────────────────────────────────────────
    loadList();
    renderList();
  </script>
</body>
</html>
